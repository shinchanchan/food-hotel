<!DOCTYPE html>
<html lang="en" data-theme="girihotel">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SKP catering HOTEL — Morning Food Billing</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
  :root{
    --amber-1:#fff8f0;
    --amber-2:#ffedd5;
    --orange-1:#f97316;
    --orange-2:#ea580c;
    --amber-glow:#fbbf24;
  }
  html[data-theme='dark']{
    --amber-1:#1a1410;
    --amber-2:#2a1f16;
  }
  * { -webkit-tap-highlight-color: transparent; }
  body{
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(160deg, var(--amber-1) 0%, var(--amber-2) 55%, var(--amber-1) 100%);
    min-height:100vh;
    transition: background .4s ease;
  }
  html[data-theme='dark'] body{ color:#f3e9dd; }
  .glass{
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(14px) saturate(160%);
    -webkit-backdrop-filter: blur(14px) saturate(160%);
    border: 1px solid rgba(255,255,255,0.35);
  }
  html[data-theme='dark'] .glass{
    background: rgba(40,28,20,0.55);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .card-food{
    transition: transform .25s cubic-bezier(.2,.8,.2,1), box-shadow .25s ease;
  }
  .card-food:active{ transform: scale(.97); }
  .card-food:hover{ transform: translateY(-4px) scale(1.015); box-shadow: 0 18px 40px -12px rgba(234,88,12,.35); }

  @keyframes fadeInUp{ from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);} }
  .fade-up{ animation: fadeInUp .5s ease both; }

  @keyframes popScale{ 0%{transform:scale(1);} 40%{transform:scale(1.18);} 100%{transform:scale(1);} }
  .pop{ animation: popScale .25s ease; }

  .ripple{ position:relative; overflow:hidden; }
  .ripple span.rip{
    position:absolute; border-radius:50%; transform:scale(0);
    animation: rippleAnim .6s linear;
    background: rgba(255,255,255,.55);
    pointer-events:none;
  }
  @keyframes rippleAnim{ to{ transform:scale(3); opacity:0; } }

  .btn-gradient{
    background: linear-gradient(135deg, var(--orange-1), var(--orange-2));
    box-shadow: 0 10px 25px -8px rgba(234,88,12,.55);
  }
  .btn-gradient:active{ transform: scale(.96); }

  .qty-btn{ transition: transform .15s ease, background .2s ease; }
  .qty-btn:active{ transform: scale(.85); }

  ::-webkit-scrollbar{ height:6px; width:6px; }
  ::-webkit-scrollbar-thumb{ background: rgba(234,88,12,.4); border-radius:10px; }

  #splash{
    position:fixed; inset:0; z-index:100;
    background: linear-gradient(135deg,#fb923c,#ea580c);
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    transition: opacity .6s ease, visibility .6s ease;
  }
  .plate{
    width:70px; height:70px; border:6px solid #fff; border-top-color:transparent; border-radius:50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .float-badge{
    animation: floatBob 2.4s ease-in-out infinite;
  }
  @keyframes floatBob{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }

  .modal-pop{ animation: modalIn .35s cubic-bezier(.2,.9,.25,1) both; }
  @keyframes modalIn{ from{opacity:0; transform: scale(.85) translateY(20px);} to{opacity:1; transform:scale(1) translateY(0);} }

  .counter-roll{ transition: all .25s ease; }

  .no-scrollbar::-webkit-scrollbar{ display:none; }
  .no-scrollbar{ -ms-overflow-style:none; scrollbar-width:none; }
</style>
</head>
<body class="pb-40">

<!-- SPLASH LOADER -->
<div id="splash">
  <div class="plate mb-4"></div>
  <div class="text-white font-bold text-xl tracking-wide">S.K.P Catering</div>
  <div class="text-white/80 text-sm mt-1">Preparing your billing counter…</div>
</div>

<!-- HEADER -->
<header class="sticky top-0 z-40 glass shadow-md">
  <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-12 h-12 rounded-2xl btn-gradient flex items-center justify-center text-white text-xl shadow-lg">
        <i class="fa-solid fa-utensils"></i>
      </div>
      <div>
        <h1 class="text-lg font-extrabold text-orange-700 leading-tight">🍽️ S.K.P Catering</h1>
        <p class="text-xs text-orange-500/80 -mt-0.5">Food Billing</p>
      </div>
    </div>
    <div class="text-right">
      <div id="liveTime" class="text-sm font-semibold text-orange-700"></div>
      <div id="liveDate" class="text-[11px] text-orange-500/70"></div>
    </div>
  </div>
  <div class="max-w-3xl mx-auto px-4 pb-3 flex items-center gap-2">
    <div class="relative flex-1">
      <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-orange-400 text-sm"></i>
      <input id="searchBox" type="text" placeholder="Search food item..."
        class="w-full pl-9 pr-3 py-2 rounded-xl text-sm glass focus:outline-none focus:ring-2 focus:ring-orange-400 placeholder-orange-400/70 text-orange-800">
    </div>
    <button id="darkToggle" class="w-10 h-10 rounded-xl glass flex items-center justify-center text-orange-600 shrink-0">
      <i class="fa-solid fa-moon"></i>
    </button>
  </div>
</header>

<!-- FLOATING TOTAL BADGE -->
<div id="floatBadge" class="float-badge fixed right-4 bottom-40 z-30 btn-gradient text-white rounded-full shadow-xl px-4 py-2 flex items-center gap-2 text-sm font-bold">
  <i class="fa-solid fa-cart-shopping"></i>
  <span id="floatCount">0</span> · ₹<span id="floatTotal">0</span>
</div>

<!-- MENU -->
<main class="max-w-3xl mx-auto px-4 pt-5">
  <div class="flex items-center gap-2 mb-3 px-1">
    <i class="fa-solid fa-bowl-food text-orange-500"></i>
    <h2 class="font-bold text-orange-800">Today's Menu</h2>
  </div>
  <div id="menuGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-4"></div>
  <p id="noResults" class="hidden text-center text-orange-400 py-10"><i class="fa-solid fa-plate-wheat text-2xl mb-2"></i><br>No items match your search</p>

  <!-- PARCEL CARD -->
  <div class="glass rounded-2xl mt-6 p-4 shadow-md fade-up flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-11 h-11 rounded-xl bg-amber-100 flex items-center justify-center text-orange-600">
        <i class="fa-solid fa-box-open"></i>
      </div>
      <div>
        <p class="font-bold text-orange-800 text-sm">Parcel Required</p>
        <p class="text-xs text-orange-500/80">Adds ₹5 packing charge</p>
      </div>
    </div>
    <input id="parcelCheck" type="checkbox" class="toggle toggle-warning">
  </div>
</main>

<!-- STICKY BILL SUMMARY -->
<div class="fixed bottom-0 left-0 right-0 z-40">
  <div class="glass shadow-[0_-10px_30px_-15px_rgba(0,0,0,0.3)] rounded-t-3xl">
    <div class="max-w-3xl mx-auto px-5 pt-3 pb-4">
      <div class="flex justify-between text-xs text-orange-700/80 mb-1">
        <span>Items Total</span>
        <span>₹<span id="itemsTotal" class="counter-roll">0</span></span>
      </div>
      <div class="flex justify-between text-xs text-orange-700/80 mb-2">
        <span>Parcel Charge</span>
        <span>₹<span id="parcelTotal" class="counter-roll">0</span></span>
      </div>
      <div class="flex justify-between items-center mb-3">
        <span class="font-bold text-orange-800">Grand Total</span>
        <span class="text-xl font-extrabold text-orange-600">₹<span id="grandTotal" class="counter-roll">0</span></span>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <button id="clearBtn" class="ripple py-3 rounded-2xl font-bold text-orange-600 bg-white/80 border border-orange-200 shadow-sm flex items-center justify-center gap-2 active:scale-95 transition">
          <i class="fa-solid fa-broom"></i> Clear
        </button>
        <button id="generateBtn" class="ripple btn-gradient py-3 rounded-2xl font-bold text-white shadow-lg flex items-center justify-center gap-2 active:scale-95 transition">
          <i class="fa-solid fa-receipt"></i> Generate Bill
        </button>
      </div>
    </div>
  </div>
</div>

<!-- BILL MODAL -->
<div id="billModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 backdrop-blur-sm px-5">
  <div class="modal-pop bg-white rounded-3xl w-full max-w-sm shadow-2xl overflow-hidden">
    <div class="btn-gradient text-white text-center py-5">
      <i class="fa-solid fa-hotel text-2xl mb-1"></i>
      <h3 class="font-extrabold text-lg">GIRI HOTEL</h3>
      <p class="text-xs opacity-90">Morning Food Bill</p>
    </div>
    <div class="px-5 py-4 max-h-[45vh] overflow-y-auto no-scrollbar" id="billBody"></div>
    <div class="px-5 pb-2">
      <div class="border-t border-dashed border-orange-300 my-2"></div>
      <div class="flex justify-between font-extrabold text-orange-700 text-lg mb-3">
        <span>Grand Total</span>
        <span>₹<span id="modalGrandTotal">0</span></span>
      </div>
    </div>
    <div class="px-5 pb-5">
      <button id="closeModal" class="w-full py-3 rounded-2xl font-bold text-white btn-gradient active:scale-95 transition">
        <i class="fa-solid fa-xmark"></i> Close
      </button>
    </div>
  </div>
</div>

<footer class="text-center text-xs text-orange-500/70 pb-3">
  Designed with ❤️ for GIRI HOTEL
</footer>

<script>
// ---------- DATA ----------
const foods = [
  { name:"Idly", unit:"Piece", price:10, qty:0, img:"https://as1.ftcdn.net/v2/jpg/07/11/64/26/1000_F_711642631_gPtU9J8xXr7FhxHVNhi9XZ5tKCcNU644.jpg" },
  { name:"Poori", unit:"Piece", price:15, qty:0, img:"https://www.spiceupthecurry.com/wp-content/uploads/2016/01/poori-masala-recipe-12.jpg" },
  { name:"Pongal", unit:"", price:40, qty:0, img:"https://i2.wp.com/www.vegrecipesofindia.com/wp-content/uploads/2016/04/ven-pongal-recipe.jpg" },
  { name:"Vada", unit:"", price:10, qty:0, img:"https://myfoodstory.com/wp-content/uploads/2022/09/Medu-Vada-2-720x1080.jpg" },
  { name:"Half Pongal", unit:"", price:20, qty:0, img:"https://i2.wp.com/www.vegrecipesofindia.com/wp-content/uploads/2016/04/ven-pongal-recipe.jpg" }
];

const grid = document.getElementById('menuGrid');
const noResults = document.getElementById('noResults');

function foodCard(food, index){
  const div = document.createElement('div');
  div.className = "card-food glass rounded-2xl p-3 shadow-md fade-up";
  div.style.animationDelay = (index*0.04)+"s";
  div.dataset.name = food.name.toLowerCase();
  div.innerHTML = `
    <div class="relative w-full h-24 rounded-xl overflow-hidden mb-2 bg-orange-100">
      <img src="${food.img}" loading="lazy"
        onerror="this.src='https://commons.wikimedia.org/wiki/Special:FilePath/Idli_-_A_Traditional_Indian_Food.JPG'"
        class="w-full h-full object-cover" alt="${food.name}">
    </div>
    <p class="font-bold text-orange-800 text-sm truncate">${food.name}</p>
    <p class="text-xs text-orange-500 mb-2">₹${food.price}${food.unit ? ' / '+food.unit : ''}</p>
    <div class="flex items-center justify-between bg-white/70 rounded-full px-1 py-1">
      <button class="qty-btn dec w-7 h-7 rounded-full bg-orange-100 text-orange-600 font-bold flex items-center justify-center" data-i="${index}">
        <i class="fa-solid fa-minus text-xs"></i>
      </button>
      <span class="qty-val font-bold text-orange-800 text-sm" data-i="${index}">0</span>
      <button class="qty-btn inc w-7 h-7 rounded-full btn-gradient text-white font-bold flex items-center justify-center" data-i="${index}">
        <i class="fa-solid fa-plus text-xs"></i>
      </button>
    </div>
  `;
  return div;
}

function renderMenu(){
  grid.innerHTML = "";
  foods.forEach((f,i)=> grid.appendChild(foodCard(f,i)));
}
renderMenu();

// ---------- QTY LOGIC ----------
grid.addEventListener('click', (e)=>{
  const incBtn = e.target.closest('.inc');
  const decBtn = e.target.closest('.dec');
  if(!incBtn && !decBtn) return;
  const i = incBtn ? incBtn.dataset.i : decBtn.dataset.i;
  if(incBtn) foods[i].qty++;
  if(decBtn) foods[i].qty = Math.max(0, foods[i].qty - 1);
  const valEl = grid.querySelector(`.qty-val[data-i="${i}"]`);
  valEl.textContent = foods[i].qty;
  valEl.classList.remove('pop'); void valEl.offsetWidth; valEl.classList.add('pop');
  calculateTotal();
});

// ---------- PARCEL ----------
const parcelCheck = document.getElementById('parcelCheck');
parcelCheck.addEventListener('change', calculateTotal);

// ---------- TOTALS ----------
function calculateTotal(){
  const itemsTotal = foods.reduce((sum,f)=> sum + f.qty*f.price, 0);
  const parcelCharge = parcelCheck.checked ? 5 : 0;
  const grand = itemsTotal + parcelCharge;
  updateUI(itemsTotal, parcelCharge, grand);
}

function updateUI(itemsTotal, parcelCharge, grand){
  document.getElementById('itemsTotal').textContent = itemsTotal;
  document.getElementById('parcelTotal').textContent = parcelCharge;
  document.getElementById('grandTotal').textContent = grand;
  document.getElementById('floatTotal').textContent = grand;
  document.getElementById('floatCount').textContent = foods.reduce((s,f)=>s+f.qty,0);
}

// ---------- SEARCH ----------
document.getElementById('searchBox').addEventListener('input', (e)=>{
  const q = e.target.value.trim().toLowerCase();
  let visible = 0;
  [...grid.children].forEach(card=>{
    const match = card.dataset.name.includes(q);
    card.style.display = match ? "" : "none";
    if(match) visible++;
  });
  noResults.classList.toggle('hidden', visible !== 0);
});

// ---------- CLEAR ----------
document.getElementById('clearBtn').addEventListener('click', ()=>{
  foods.forEach(f=> f.qty = 0);
  parcelCheck.checked = false;
  grid.querySelectorAll('.qty-val').forEach(el=> el.textContent = "0");
  calculateTotal();
});

// ---------- GENERATE BILL ----------
const billModal = document.getElementById('billModal');
document.getElementById('generateBtn').addEventListener('click', generateBill);
document.getElementById('closeModal').addEventListener('click', ()=>{
  billModal.classList.add('hidden'); billModal.classList.remove('flex');
});

function generateBill(){
  const selected = foods.filter(f=> f.qty > 0);
  const billBody = document.getElementById('billBody');
  billBody.innerHTML = "";

  if(selected.length === 0){
    billBody.innerHTML = `<p class="text-center text-orange-400 py-6"><i class="fa-solid fa-plate-wheat text-xl"></i><br>No items selected</p>`;
  } else {
    selected.forEach(f=>{
      const row = document.createElement('div');
      row.className = "flex justify-between text-sm py-1 text-orange-800";
      row.innerHTML = `<span>${f.name} x${f.qty}</span><span>₹${f.qty*f.price}</span>`;
      billBody.appendChild(row);
    });
  }

  const parcelCharge = parcelCheck.checked ? 5 : 0;
  if(parcelCharge > 0){
    const row = document.createElement('div');
    row.className = "flex justify-between text-sm py-1 text-orange-800";
    row.innerHTML = `<span>Parcel</span><span>₹${parcelCharge}</span>`;
    billBody.appendChild(row);
  }

  const itemsTotal = selected.reduce((s,f)=> s+f.qty*f.price, 0);
  document.getElementById('modalGrandTotal').textContent = itemsTotal + parcelCharge;

  billModal.classList.remove('hidden'); billModal.classList.add('flex');
}

// ---------- RIPPLE EFFECT ----------
document.querySelectorAll('.ripple').forEach(btn=>{
  btn.addEventListener('click', function(e){
    const rip = document.createElement('span');
    rip.className = "rip";
    const rect = this.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    rip.style.width = rip.style.height = size+"px";
    rip.style.left = (e.clientX - rect.left - size/2)+"px";
    rip.style.top = (e.clientY - rect.top - size/2)+"px";
    this.appendChild(rip);
    setTimeout(()=> rip.remove(), 600);
  });
});

// ---------- DARK MODE ----------
const darkToggle = document.getElementById('darkToggle');
darkToggle.addEventListener('click', ()=>{
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'girihotel-dark';
  html.setAttribute('data-theme', isDark ? 'girihotel' : 'girihotel-dark');
  darkToggle.innerHTML = isDark ? '<i class="fa-solid fa-moon"></i>' : '<i class="fa-solid fa-sun"></i>';
});

// ---------- LIVE CLOCK ----------
function tickClock(){
  const now = new Date();
  document.getElementById('liveTime').textContent = now.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  document.getElementById('liveDate').textContent = now.toLocaleDateString('en-IN', {weekday:'short', day:'numeric', month:'short', year:'numeric'});
}
tickClock();
setInterval(tickClock, 1000);

// ---------- SPLASH ----------
window.addEventListener('load', ()=>{
  setTimeout(()=>{
    const splash = document.getElementById('splash');
    splash.style.opacity = '0';
    splash.style.visibility = 'hidden';
    setTimeout(()=> splash.remove(), 700);
  }, 700);
});

calculateTotal();
</script>
</body>
</html>
